version: '3.8'

services:
  # PostgreSQL with pgvector
  postgres:
    image: ankane/pgvector:latest
    container_name: my-own-ai-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vectordb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - ai-network

  # Ollama Service
  ollama:
    image: ollama/ollama:latest
    container_name: my-own-ai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - ai-network

  # Ollama Model Puller
  ollama-puller:
    image: ollama/ollama:latest
    container_name: my-own-ai-model-puller
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "🔍 Checking if models are already pulled..."
        
        if ollama list | grep -q "nomic-embed-text"; then
          echo "nomic-embed-text already exists"
        else
          echo "Pulling nomic-embed-text (274 MB)..."
          ollama pull nomic-embed-text
        fi
        
        if ollama list | grep -q "gemma3"; then
          echo "gemma3 already exists"
        else
          echo "Pulling gemma3:4b (3.3 GB)..."
          ollama pull gemma3:4b
        fi
        
        echo "All models ready!"
        ollama list
    networks:
      - ai-network

  # MY-OWN-AI Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-own-ai-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_APPLICATION_NAME=my-own-ai
      - SERVER_PORT=8080

      # Ollama Connection
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - OLLAMA_GENERATE_MODEL=gemma3:4b
      - OLLAMA_TIMEOUT_SECONDS=180

      # PostgreSQL Connection (NEW!)
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/vectordb
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=secret123

      # Vector DB Config
      - VECTORDB_DEMO_DIMENSIONS=16
      - VECTORDB_HNSW_M=16
      - VECTORDB_HNSW_EF_CONSTRUCTION=200
      - VECTORDB_HNSW_EF_SEARCH=50

      # Document Chunking
      - DOCUMENT_CHUNK_WORDS=150
      - DOCUMENT_CHUNK_OVERLAP=20

      # Logging
      - LOGGING_LEVEL_COM_MYOWNAI=INFO

      # JVM Options
      - JAVA_OPTS=-Xmx512m -Xms256m
    depends_on:
      postgres:
        condition: service_healthy
      ollama-puller:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - ai-network

# Networks
networks:
  ai-network:
    driver: bridge

# Volumes

volumes:
  ollama_data:
    name: my-own-ai-ollama-data
  postgres_data:
    name: my-own-ai-postgres-data