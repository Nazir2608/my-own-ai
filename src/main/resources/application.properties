# Server Configuration
server.port=8080
spring.application.name=my-own-ai

# DATABASE CONFIGURATION (PostgreSQL + pgvector)
spring.datasource.url=jdbc:postgresql://postgres:5432/vectordb
spring.datasource.username=admin
spring.datasource.password=secret123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# Ollama Configuration
ollama.host=http://localhost:11434
ollama.embed.model=nomic-embed-text
ollama.generate.model=gemma3:4b
ollama.timeout.seconds=180

# Vector Database Configuration
vectordb.demo.dimensions=16
vectordb.hnsw.m=16
vectordb.hnsw.ef-construction=200
vectordb.hnsw.ef-search=50

# Document Chunking
document.chunk.words=150
document.chunk.overlap=20
document.max-words-per-chunk=150
document.max-tokens-per-chunk=512

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true
file.upload.allowed-extensions=pdf,doc,docx,txt

# Logging
logging.level.com.nazir.myownai=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Disable Spring Boot banner for cleaner output
spring.main.banner-mode=off

# Enable debug for troubleshooting
debug=false